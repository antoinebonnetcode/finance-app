name: Finance Pipeline — IBKR + Fortuneo

on:
  schedule:
    - cron: '0 7 1 * *'   # 1er du mois à 7h UTC (9h Paris)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (aucun upload vers Sheets)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt || (
            pip install gspread "google-auth>=2.0" "google-api-python-client>=2.0" \
              "openpyxl>=3.1" "xlrd>=2.0" "pdfplumber>=0.10" "python-dotenv>=1.0" \
              "selenium>=4.0" "webdriver-manager>=4.0" &&
            pip install ibflex --no-build-isolation || echo "[WARN] ibflex not installed, XML fallback will be used"
          )

      - name: Install Chrome & ChromeDriver
        run: |
          # Install latest stable Google Chrome
          wget -q -O /tmp/google-chrome.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/google-chrome.deb || \
            sudo apt-get install -f -y
          google-chrome --version
          # ChromeDriver is managed automatically by webdriver-manager

      - name: Write Google credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SA_JSON }}' > credentials/service_account.json

      - name: Run pipeline
        env:
          SHEETS_ID:                   ${{ secrets.SHEETS_ID }}
          DRIVE_FOLDER_IBKR:           ${{ secrets.DRIVE_FOLDER_IBKR }}
          IBKR_FLEX_TOKEN:             ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID:          ${{ secrets.IBKR_FLEX_QUERY_ID }}
          FORTUNEO_LOGIN:              ${{ secrets.FORTUNEO_LOGIN }}
          FORTUNEO_PASSWORD:           ${{ secrets.FORTUNEO_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID:      ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET:  ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN:  ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_PATH: credentials/service_account.json
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry
          else
            python main.py
          fi

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_id }}
          path: /tmp/fortuneo_*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials/service_account.json
